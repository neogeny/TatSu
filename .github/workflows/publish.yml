name: publish to pypi

on:
  # Setting it to an empty block removes all manual inputs
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tatsu
    permissions:
      # CRITICAL: This allows the runner to request the OIDC token
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - name: install hatch and gh
        run: uv tool install hatch && uv tool install gh

      - name: build
        run: uvx hatch build

      - name: publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true
          skip-existing: true
