name: tests default
on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.15'
          - '3.14'
          - '3.13'
          - '3.12'

    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth 2 allows git diff HEAD^ HEAD to work reliably
          fetch-depth: 2

      - name: install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz

      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: install dependencies
        run: uv sync --group test

      - name: env
        run: |
          python3 --version
          uv run python -c "import pytest"
          uv run tatsu --version

      - name: ruff
        run: uv run ruff check -q --preview tatsu tests examples
      - name: ty
        run: uv run ty check tatsu tests examples
      - name: pytest
        run: uv run pytest tests

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: install dependencies
        run: uv sync --group doc
      - name: docs
        run: uv run sphinx docs/ docs/_build/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: build
        run: uv build
